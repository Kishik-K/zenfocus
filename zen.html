<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenFocus To-Do</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>ZenFocus</h1>
            <p class="subtitle">Organize your thoughts, master your day.</p>
        </header>

         <div class="input-card">
            <input type="text" placeholder="What's the next task?">
            <input type="date">
            <button class="add-button">Add Task</button>
        </div>

        <div class="list-header">
            <h3>Your Tasks</h3>
        </div>
        
        <div class="todo-list-wrapper"></div>

       
    </div>
</body>
</html>
